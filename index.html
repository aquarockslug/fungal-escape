<!doctype html>
<head>
  <title>Spore Shooter!</title>
  <meta charset="utf-8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" href="css/modern-normalize.min.css" />
  <link rel="stylesheet" href="css/snes.min.css" />
  <style>
    #ui {
      position: absolute;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    #menu {
      display: flex;
      flex-direction: column;
      width: 66%;
      background-color: rgba(1, 1, 1, 0.2);
      align-items: center;
      margin: 20px;
    }
    #stage-select {
      background-color: rgba(1, 1, 1, 0.2);
      margin: 20px;
    }
    #health-bar {
      display: flex;
      position: absolute;
      background-color: red;
      top: 15px;
      left: 15px;
      width: 500px;
      padding: 0px;
      margin: 10px;
    }
    #h1 {
      justify-self: center;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="health-bar" class="snes-container">
    </div>
      <div id="menu" class="snes-container">
        <h1>Spore Shooter!</h1>
        <p>Use the arrow keys to move and jump.</p>
      </div>
      <div id="stage-select" class="snes-container">
        <input type="radio" id="s1" name="stages" value="1" checked>
        <label for="s1">Stage 1</label><br>
        <input type="radio" id="s2" name="stages" value="2">
        <label for="s1">Stage 2</label><br>
        <input type="radio" id="s3" name="stages" value="3">
        <label for="s1">Stage 3</label><br>
        <input type="radio" id="s4" name="stages" value="4">
        <label for="s1">Stage 4</label><br>
        <input type="radio" id="s5" name="stages" value="5">
        <label for="s1">Stage 5</label><br>
        <input type="radio" id="s6" name="stages" value="6">
        <label for="s1">Stage 6</label><br>
        <button class="snes-button has-phantom-color" onclick="gameStart();
	      document.getElementById('menu').style.display = 'none';
	      document.getElementById('stage-select').style.display = 'none';">Start</button>
    </div>
  </div>
  <script src="javascript/lib/littlejs.js"></script>
  <script src="javascript/lib/fpo.src.js"></script>

  <script src="javascript/textures.js"></script>
  <script src="javascript/grid.js"></script>
  <script src="javascript/particles.js"></script>

  <script src="javascript/molecule.js"></script>
  <script src="javascript/player.js"></script>
  <script src="javascript/rival.js"></script>

  <script src="javascript/stages/stage.js"></script>
  <script src="javascript/stages/stage1.js"></script>
  <script src="javascript/stages/stage2.js"></script>
  <script src="javascript/stages/stage3.js"></script>
  <script src="javascript/stages/stage4.js"></script>
  <script src="javascript/stages/stage5.js"></script>
  <script src="javascript/stages/stage6.js"></script>

  <script>
    started = false

    settings = {
      screenResolution: vec2(640, 480),
      particleUpdateInterval: 0.1, // number of seconds between grid particle updates
      backgroundScroll: -20
    };
    setCanvasFixedSize(settings.screenResolution);

    colors = {
      bg: new Color(1, 1, 1, 1),
    };

    sfx = {
      chime: new Sound([0.2,,531,0.08,0.29,0.36,,0.2,,,472,0.06,0.09,,,,,0.8,0.16,,846,]),
      shoot: new Sound([,,173,,.03,.2,2,1.4,-17,15,,,,.9,,,,.58,.2]),
      shoot2: new Sound([1.2,,99,,.04,.06,3,3.8,-14,-4,,,,,,.3,.2,.6,.17,,585])
    };


  </script>
  <script src="javascript/game.js"></script>
  <script>
    engineInit(
      gameInit,
      gameUpdate,
      gameUpdatePost,
      gameRender,
      gameRenderPost,
      Textures().paths
    );
  </script>
</body>
