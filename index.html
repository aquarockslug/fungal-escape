<!doctype html>
<head>
  <title>Fungal Escape</title>
  <meta charset="utf-8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" href="css/modern-normalize.min.css" />
  <link rel="stylesheet" href="css/snes.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="ui">

    <div id="main-menu">
    <img id="title" style="position: absolute; top: 150px; left: 25px" src="assets/title.png"/>
    <img src="assets/menu.png"/>
    <img src="assets/dialog.png" hidden/>
    <div
      id="start-button"
      onclick="
		document.getElementById('main-menu').style['animation-play-state'] = 'running';
		document.getElementById('main-menu').style['top'] = '525px'
		new Promise((resolve) =>
			setTimeout(() => {
		document.getElementById('title').style.display = 'none';
		document.getElementById('start-button').style.display = 'none';
		document.getElementById('stage-select').style.display = 'flex';
		document.getElementById('ui').style.display = 'flex';
		document.getElementById('ui').style['justify-content'] = 'flex-end';
			}, 250),
		);
      		sfx.button.play()
	"
    >
      <img style='position: absolute;' src='assets/button.png'>
      <h1 style='position: absolute; top: 25px; left: 35px'>CHOOSE A CHARACTER</h1>
      </img>
    </div>
    </div>

    <div id="health-bar" class="snes-container"></div>
    <div id="timer" class="snes-container"></div>
    <div id="message" class="snes-container"> you continue running... </div>

    <div id="stage-select" onChange="sfx.button.play()">
    <div class="snes-form-group">
      <label style="font-size: 12px" >CHARACTER SELECT</label>
      <div class="snes-radio snes-radio">
        <label class="snes-radio__item has-ember-icon">
          <input type="radio" name="player-select" value="0" checked />
          <span class="snes-radio__item__content">DEIMOS</span>
        </label>
        <label class="snes-radio__item has-turquoise-icon">
          <input type="radio" id="blue" name="player-select" value="4" />
          <span class="snes-radio__item__content">PHOBOS</span>
        </label>
        <label class="snes-radio__item has-galaxy-icon">
          <input type="radio" id="purple" name="player-select" value="2" />
          <span class="snes-radio__item__content">EUROPA</span>
        </label>
        <label class="snes-radio__item has-green-icon">
          <input type="radio" id="green" name="player-select" value="3" />
          <span class="snes-radio__item__content">IO</span>
        </label>
      </div>
    </div>

        <div
	     onclick="
		document.getElementById('stage-select').style.display = 'none';
		document.getElementById('title').style.display = 'none';
		document.getElementById('main-menu').style.display = 'none';
		document.getElementById('health-bar').style.display = 'block';
	     	sfx.button.play()
		gameStart();
		">
      	<img style='position: absolute; scale: 0.5; left: 525px' src='assets/button.png'
        >
	</img>
      		<h1 style='position: relative; left: 120px; top: 30px'>PLAY</h1>
	</div>


    </div>

  </div>
  <script src="javascript/lib/littlejs.js"></script>
  <script src="javascript/lib/fpo.src.js"></script>

  <script>
    state = "main_menu";
    started = false;

    settings = {
      screenResolution: vec2(640, 480),
      particleUpdateInterval: 0.1, // number of seconds between grid particle updates
      backgroundScroll: -20,
      stageTimerLength: 10
    }

    vfx = {
	    jetpack: [0.2, 30, 700, 0.05, undefined, new Color(0.761, 0.761, 0.761, 1), new Color(0.431, 0.431, 0.431, 1), new Color(0.129, 0.129, 0.129, 0), new Color(1, 1, 1, 0), 0.5, 0.2, 0.1, 0.05, 0.01, 1, 1, 1, 3.14, 0.1, 0.07, 0, 0, 1]
    }

    sfx = {
	    jump: new Sound([1.4,,289,.01,.03,.06,1,2.3,,76,,,,.3,,.1,.01,.99,.02]),
	    damage: new Sound([.5,,73,.01,.01,.02,3,3.4,,,,,,1.7,,,,.64,.06,.19,419]),
	    button: new Sound([1.1,,379,.01,.03,.01,3,.6,-0.1,,,,,.2,-1,,.02,.43,,.34,-1320]),
    };
  </script>
  <script src="javascript/textures.js"></script>
  <script src="javascript/grid.js"></script>
  <script src="javascript/particles.js"></script>

  <script src="javascript/molecule.js"></script>
  <script src="javascript/player.js"></script>
  <script src="javascript/rival.js"></script>

  <script src="javascript/stages/stage.js"></script>
  <script src="javascript/stages/Scrapyard.js"></script>
  <script src="javascript/stages/Backstreets.js"></script>
  <script src="javascript/stages/NightCity.js"></script>
  <script src="javascript/stages/Greenhouse.js"></script>
  <script src="javascript/stages/ElectricPlant.js"></script>
  <script src="javascript/stages/MossyShrine.js"></script>
  <script src="javascript/stages/DawnForest.js"></script>

  <script src="javascript/game.js"></script>
  <script>
    engineInit(
      gameInit,
      gameUpdate,
      gameUpdatePost,
      gameRender,
      gameRenderPost,
      Textures().paths,
    );
  </script>
</body>
