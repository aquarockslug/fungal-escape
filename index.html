<!doctype html>
<head>
  <title>Mega Bullet!</title>
  <meta charset="utf-8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" href="css/modern-normalize.min.css" />
  <link rel="stylesheet" href="css/snes.min.css" />
  <style>
    #ui {
      position: absolute;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #menu {
      display: flex;
      flex-direction: column;
      width: 33%;
      background-color: white;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="menu" class="snes-container">
      <h1>Mega Bullet!</h1>
      <p>A mega man bullet hell game. Use the arrow keys to move and use the mouse to shoot. Press space to switch weapon</p>
      <button class="snes-button has-phantom-color" onclick="gameStart(); sfx.chime.play(); started = true; document.getElementById('menu').style.display = 'none';">Start</button>
    </div>
  </div>
  <script src="javascript/lib/littlejs.js"></script>
  <script src="javascript/lib/fpo.src.js"></script>
  <script src="javascript/textures.js"></script>
  <script src="javascript/grid.js"></script>
  <script src="javascript/particles.js"></script>
  <script src="javascript/molecule.js"></script>
  <script src="javascript/player.js"></script>
  <script>
    started = false

    settings = {
      screenResolution: vec2(480, 360),
      particleUpdateInterval: 0.1, // number of seconds between grid particle updates
      backgroundScroll: -20
    };
    setCanvasFixedSize(settings.screenResolution);

    colors = {
      bg: new Color(1, 1, 1, 1),
    };

    const sfx = {
      chime: new Sound([0.2,,531,0.08,0.29,0.36,,0.2,,,472,0.06,0.09,,,,,0.8,0.16,,846,]),
      shoot: new Sound([,,173,,.03,.2,2,1.4,-17,15,,,,.9,,,,.58,.2]),
      shoot2: new Sound([1.2,,99,,.04,.06,3,3.8,-14,-4,,,,,,.3,.2,.6,.17,,585])
    };
  </script>
  <script src="javascript/game.js"></script>
  <script>
    engineInit(
      gameInit,
      gameUpdate,
      gameUpdatePost,
      gameRender,
      gameRenderPost,
      Textures().paths
    );
  </script>
</body>
