<!doctype html>
<head>
  <title>Fungal Escape</title>
  <meta charset="utf-8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" href="css/modern-normalize.min.css" />
  <link rel="stylesheet" href="css/snes.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="ui">
    <img id="main-menu" src='assets/fungal-escape-titlemenu.png'/>
    <div
      id="start-button"
      onclick="
		document.getElementById('start-button').style.display = 'none';
		document.getElementById('main-menu').style.display = 'none';
		document.getElementById('stage-select').style.display = 'flex';
		document.getElementById('ui').style.display = 'flex';
		document.getElementById('ui').style['justify-content'] = 'flex-end';
	"
    >
      <h1>START</h1>
    </div>
    <div id="health-bar" class="snes-container"></div>
    <div id="stage-select" class="snes-form-group snes-container">
      <label>CHARACTER SELECT</label>
      <div class="snes-radio snes-radio--vertical">
        <label class="snes-radio__item has-ember-icon">
          <input type="radio" name="player-select" value="red" checked />
          <span class="snes-radio__item__content">DEIMOS</span>
        </label>
        <label class="snes-radio__item has-turquoise-icon">
          <input type="radio" id="blue" name="player-select" value="blue" />
          <span class="snes-radio__item__content">PHOBOS</span>
        </label>
        <label class="snes-radio__item has-galaxy-icon">
          <input type="radio" id="purple" name="player-select" value="purple" />
          <span class="snes-radio__item__content">EUROPA</span>
        </label>
        <label class="snes-radio__item has-green-icon">
          <input type="radio" id="green" name="player-select" value="green" />
          <span class="snes-radio__item__content">IO</span>
        </label>
      </div>
        <button
          class="snes-button has-phantom-color"
          onclick="
		document.getElementById('stage-select').style.display = 'none';
		document.getElementById('health-bar').style.display = 'block';
		gameStart();
	"
        >
          PLAY
        </button>
    </div>
  </div>
  <script src="javascript/lib/littlejs.js"></script>
  <script src="javascript/lib/fpo.src.js"></script>

  <script>
    state = "main_menu";
    started = false;

    settings = {
      screenResolution: vec2(640, 480),
      particleUpdateInterval: 0.1, // number of seconds between grid particle updates
      backgroundScroll: -20,
    }

    vfx = {
	    jetpack: [0.2, 30, 700, 0.05, undefined, new Color(0.761, 0.761, 0.761, 1), new Color(0.431, 0.431, 0.431, 1), new Color(0.129, 0.129, 0.129, 0), new Color(1, 1, 1, 0), 0.5, 0.2, 0.1, 0.05, 0.01, 1, 1, 1, 3.14, 0.1, 0.07, 0, 0, 1]
    }

    sfx = {
      chime: new Sound([
        0.2,
        ,
        531,
        0.08,
        0.29,
        0.36,
        ,
        0.2,
        ,
        ,
        472,
        0.06,
        0.09,
        ,
        ,
        ,
        ,
        0.8,
        0.16,
        ,
        846,
      ]),
      shoot: new Sound([
        ,
        ,
        173,
        ,
        0.03,
        0.2,
        2,
        1.4,
        -17,
        15,
        ,
        ,
        ,
        0.9,
        ,
        ,
        ,
        0.58,
        0.2,
      ]),
      shoot2: new Sound([
        1.2,
        ,
        99,
        ,
        0.04,
        0.06,
        3,
        3.8,
        -14,
        -4,
        ,
        ,
        ,
        ,
        ,
        0.3,
        0.2,
        0.6,
        0.17,
        ,
        585,
      ]),
    };
  </script>
  <script src="javascript/textures.js"></script>
  <script src="javascript/grid.js"></script>
  <script src="javascript/particles.js"></script>

  <script src="javascript/molecule.js"></script>
  <script src="javascript/player.js"></script>
  <script src="javascript/rival.js"></script>

  <script src="javascript/stages/stage.js"></script>
  <script src="javascript/stages/toxic.js"></script>

  <script src="javascript/game.js"></script>
  <script>
    engineInit(
      gameInit,
      gameUpdate,
      gameUpdatePost,
      gameRender,
      gameRenderPost,
      Textures().paths,
    );
  </script>
</body>
