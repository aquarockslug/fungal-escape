<!doctype html>
<head>
  <title>Mega Bullet!</title>
  <meta charset="utf-8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" href="css/modern-normalize.min.css" />
  <link rel="stylesheet" href="css/snes.min.css" />
  <style>
    #ui {
      position: absolute;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #menu {
      display: flex;
      flex-direction: column;
      width: 33%;
      background-color: white;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="menu" class="snes-container">
      <h1>Mega Bullet!</h1>
      <p>A mega man bullet hell game</p>
      <button class="snes-button has-phantom-color" onclick="gameStart(); sfx.chime.play(); started = true; document.getElementById('menu').style.display = 'none';">Start</button>
    </div>
  </div>
  <script src="javascript/lib/littlejs.js"></script>
  <script src="javascript/lib/fpo.src.js"></script>
  <script src="javascript/textures.js"></script>
  <script src="javascript/grid.js"></script>
  <script src="javascript/particles.js"></script>
  <script src="javascript/molecule.js"></script>
  <script>
    started = false

    settings = {
      screenResolution: vec2(720),
      particleUpdateInterval: 0.1, // number of seconds between grid particle updates
      backgroundScrollSpeed: -0.2
    };
    setCanvasFixedSize(settings.screenResolution);

    colors = {
      bg: new Color(1, 1, 1, 1),
    };

    const sfx = {
      chime: new Sound([
        0.2,
        ,
        531,
        0.08,
        0.29,
        0.36,
        ,
        0.2,
        ,
        ,
        472,
        0.06,
        0.09,
        ,
        ,
        ,
        ,
        0.8,
        0.16,
        ,
        846,
      ]),
    };
  </script>
  <script src="javascript/game.js"></script>
  <script>
    engineInit(
      gameInit,
      gameUpdate,
      gameUpdatePost,
      gameRender,
      gameRenderPost,
      Textures().paths
    );
  </script>
</body>
